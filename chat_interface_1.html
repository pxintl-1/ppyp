<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Chat - Config Pro Dashboard</title>
    <style>
        /* 核心賽博與現代黑綠美學 */
        :root {
            --bg-color: #030705;         
            --chat-bg: #050C08;          
            --header-bg: #07120B; 
            --text-main: #E0E6E3;        
            --text-muted: #527363;       
            --bubble-me: rgba(13, 42, 29, 0.7);        
            --bubble-other: rgba(20, 24, 22, 0.8);     
            --accent-green: #00FF88;     
            --accent-glow: rgba(0, 255, 136, 0.25);
            --hangup-red: #FF4444;       
            --border-color: rgba(0, 255, 136, 0.15);
            
            /* 控制面板專用 */
            --panel-bg: #050B08;
            --panel-card-bg: rgba(10, 24, 16, 0.85);
            --panel-btn-gray: #0D1F16;
            --panel-border: rgba(0, 255, 136, 0.2);
        }

        .light-theme {
            --bg-color: #E6ECE8;
            --chat-bg: #F0F5F2;
            --header-bg: #FFFFFF;
            --text-main: #1A2621;
            --text-muted: #708A7E;
            --bubble-me: #C2EAD4;
            --bubble-other: #E2E8E5;
            --accent-green: #00A859;
            --accent-glow: rgba(0, 168, 89, 0.15);
            --hangup-red: #D93838;
            --border-color: rgba(0, 168, 89, 0.15);
            
            --panel-bg: #FFFFFF;
            --panel-card-bg: #F3F7F5;
            --panel-btn-gray: #E2EAE5;
            --panel-border: rgba(0, 168, 89, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-main);
            transition: none !important; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html {
            background-color: var(--bg-color);
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .chat-container {
            width: 100%;
            height: 100%;
            background-color: var(--chat-bg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 頂欄 (整條具備點擊判定，防呆升級) */
        .chat-header {
            height: 65px;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            z-index: 2000; 
            position: relative;
            cursor: pointer;
        }

        .header-left { display: flex; align-items: center; gap: 10px; max-width: 40%; overflow: hidden; }
        
        .avatar-box {
            width: 40px;
            height: 40px;
            border: 1px solid var(--accent-green);
            box-shadow: 0 0 6px var(--accent-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            background-size: cover;
            background-position: center;
            background-color: #09160F;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .header-title-wrap { display: flex; align-items: center; gap: 6px; overflow: hidden; }
        .header-title { font-size: 16px; font-weight: 500; text-shadow: 0 0 4px var(--accent-glow); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .arrow-down { font-size: 9px; color: var(--accent-green); flex-shrink: 0; }

        .header-center-actions { display: flex; align-items: center; gap: 16px; z-index: 2100; }
        .icon-svg-btn { background: none; border: none; padding: 6px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .icon-svg-btn svg { width: 22px; height: 22px; stroke: var(--text-main); stroke-width: 1.5; fill: none; }

        .header-right { display: flex; align-items: center; gap: 10px; border-left: 1px solid var(--border-color); padding-left: 12px; height: 34px; max-width: 40%; }
        .my-info-block { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; overflow: hidden; }
        .my-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 訊息流 */
        .message-area {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch; 
            background-color: rgba(5, 12, 8, 0.2); 
            position: relative;
            z-index: 1;
        }

        .message-row { display: flex; align-items: flex-start; gap: 12px; max-width: 85%; }
        .message-row.other { align-self: flex-start; }
        .message-row.me { align-self: flex-end; flex-direction: row-reverse; }
        .message-row.system-log { align-self: center; max-width: 100%; }
        
        .system-log-text {
            background-color: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.1);
            padding: 4px 14px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .msg-avatar { width: 36px; height: 36px; font-size: 13px; border-radius: 50%; }
        .message { padding: 12px 16px; border-radius: 8px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .message.other { background-color: var(--bubble-other); border-left: 3px solid var(--accent-green); } 
        .message.me { background-color: var(--bubble-me); border-right: 3px solid var(--accent-green); }

        /* 「正在輸入中...」精準固定在打字欄上方 */
        .typing-bar-sticky {
            display: none; 
            width: 100%;
            background-color: rgba(5, 12, 8, 0.85);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-top: 1px solid rgba(0, 255, 136, 0.08);
            z-index: 5;
            animation: fadeIn 0.15s ease;
        }
        .typing-bubble-sticky {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .typing-bubble-sticky span {
            color: var(--accent-green);
            font-weight: 500;
        }
        .typing-dot {
            width: 4px;
            height: 4px;
            background-color: var(--accent-green);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-dot:nth-child(2) { animation-delay: .2s; }
        .typing-dot:nth-child(3) { animation-delay: .4s; }

        @keyframes blink {
            0% { opacity: .2; }
            20% { opacity: 1; }
            100% { opacity: .2; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(3px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 輸入底欄 */
        .input-area {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-top: 1px solid var(--border-color);
            background-color: var(--header-bg);
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); 
            z-index: 10;
        }

        .message-input { flex: 1; padding: 10px 14px; border: 1px solid var(--border-color); outline: none; background-color: rgba(0, 0, 0, 0.4); height: 40px; font-size: 14px; border-radius: 6px; }
        
        .bottom-action-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .bottom-action-btn svg { width: 22px; height: 22px; stroke: var(--accent-green); stroke-width: 2; fill: none; }
        
        .force-trigger-btn { font-size: 18px; color: var(--accent-green); filter: drop-shadow(0 0 2px var(--accent-glow)); cursor: pointer; user-select: none; text-align: center; line-height: 32px; width: 32px; height: 32px; }
        .force-trigger-btn:active { transform: scale(0.85); opacity: 0.7; }

        /* 設定面板 */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 5000; 
            display: none;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .pref-panel {
            width: 100%;
            max-width: 390px;
            height: 90%;
            background-color: var(--panel-bg);
            border: 1px solid var(--panel-border);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
        }

        .panel-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: rgba(0,0,0,0.3);
            border-bottom: 1px solid var(--border-color);
        }
        .panel-main-title { font-size: 16px; font-weight: bold; color: var(--accent-green); text-shadow: 0 0 4px var(--accent-glow); }
        .panel-save-btn {
            background-color: var(--accent-green);
            border: none; padding: 6px 18px; font-size: 13px; font-weight: bold; color: #000;
            cursor: pointer; border-radius: 4px; box-shadow: 0 0 8px var(--accent-glow);
        }

        .panel-view-segment {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-view-segment.active { display: flex; }

        .main-menu-list { padding: 24px 16px; display: flex; flex-direction: column; gap: 16px; }
        .menu-nav-item {
            background-color: var(--panel-btn-gray);
            border: 1px solid var(--panel-border);
            padding: 16px; border-radius: 8px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 500;
        }
        .menu-nav-item:hover { border-color: var(--accent-green); box-shadow: 0 0 8px var(--accent-glow); }
        .nav-arrow { color: var(--accent-green); font-weight: bold; }

        .panel-action-toolbar { display: flex; background-color: rgba(0, 0, 0, 0.4); border-bottom: 1px solid var(--border-color); padding: 10px 16px; gap: 12px; align-items: center; }
        .toolbar-btn { background-color: var(--panel-btn-gray); border: 1px solid var(--panel-border); padding: 6px 14px; font-size: 12px; border-radius: 4px; cursor: pointer; text-align: center; user-select: none; }
        .toolbar-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }
        .toolbar-btn.danger { border-color: rgba(255,68,68,0.4); color: var(--hangup-red); }
        .toolbar-btn.danger:hover { background-color: rgba(255,68,68,0.1); border-color: var(--hangup-red); }

        .panel-body-scroll { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

        .loaded-cards-container { display: flex; flex-direction: column; gap: 10px; }
        .card-list-item { background-color: var(--panel-card-bg); border: 1px solid var(--panel-border); padding: 14px; display: flex; align-items: center; justify-content: space-between; border-radius: 8px; }
        .card-item-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .card-checkbox { width: 18px; height: 18px; accent-color: var(--accent-green); flex-shrink: 0; cursor: pointer; }
        .group-badge { font-size: 11px; border: 1px solid rgba(0, 255, 136, 0.4); background-color: rgba(0, 255, 136, 0.08); padding: 2px 8px; color: var(--accent-green); border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
        .card-item-text { font-size: 14px; word-break: break-all; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .card-item-del-x { color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 0 6px; }
        .card-item-del-x:hover { color: var(--hangup-red); }

        .section-box { border: 1px solid var(--border-color); background-color: rgba(0,0,0,0.2); padding: 14px; border-radius: 8px; }
        .section-label { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .group-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 10px; }
        .group-dropdown { flex: 1; padding: 8px; background-color: rgba(0,0,0,0.4); border: 1px solid var(--panel-border); outline: none; font-size: 13px; border-radius: 4px; }
        .add-group-text { font-size: 12px; color: var(--accent-green); cursor: pointer; border: 1px solid rgba(0,255,136,0.3); padding: 4px 8px; border-radius: 4px; }
        
        .import-textarea { width: 100%; height: 80px; background-color: rgba(0,0,0,0.4); border: 1px solid var(--panel-border); padding: 10px; font-size: 13px; outline: none; resize: none; border-radius: 4px; }
        .panel-input-field { width: 100%; padding: 10px; background-color: rgba(0,0,0,0.4); border: 1px solid var(--panel-border); font-size: 13px; border-radius: 4px; outline: none; margin-bottom: 12px; }
        
        .range-inputs-flex { display: flex; gap: 12px; align-items: center; }
        .range-inputs-flex input { margin-bottom: 0; text-align: center; }

        .switch-row { display: flex; justify-content: space-between; align-items: center; }
        .switch-container { position: relative; width: 44px; height: 24px; }
        .switch-container input { opacity: 0; width: 0; height: 0; }
        .switch-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.1); border: 1px solid var(--panel-border); border-radius: 24px; }
        .switch-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: var(--text-muted); border-radius: 50%; }
        input:checked + .switch-slider { background-color: rgba(0, 255, 136, 0.1); border-color: var(--accent-green); }
        input:checked + .switch-slider:before { transform: translateX(20px); background-color: var(--accent-green); box-shadow: 0 0 6px var(--accent-glow); }

        .panel-bottom-action-bar { display: flex; padding: 14px 16px; background-color: rgba(0, 0, 0, 0.5); border-top: 1px solid var(--border-color); gap: 12px; }
        .bottom-action-btn-main { flex: 1; padding: 12px 0; background-color: var(--panel-btn-gray); border: 1px solid var(--panel-border); font-size: 14px; text-align: center; cursor: pointer; border-radius: 6px; font-weight: 500; }
        .bottom-action-btn-main.highlight { background-color: rgba(0, 255, 136, 0.08); color: var(--accent-green); border-color: var(--accent-green); box-shadow: 0 0 10px var(--accent-glow); }
        .bottom-action-btn-main.ready-inject { background-color: var(--accent-green); color: #000; font-weight: bold; box-shadow: 0 0 12px var(--accent-glow); }

        .bg-preview-box { width: 100%; height: 180px; border: 1px dashed var(--panel-border); border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 13px; color: var(--text-muted); background-size: cover; background-position: center; margin-bottom: 12px; }

        /* 全螢幕大通話 */
        .full-call-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #020503; display: none; flex-direction: column; align-items: center; justify-content: space-between; padding: 120px 0 100px 0; z-index: 3500; }
        .full-call-avatar { width: 90px; height: 90px; border: 1px solid var(--accent-green); box-shadow: 0 0 15px var(--accent-glow); background-size: cover; background-position: center; margin-bottom: 24px; border-radius: 50%; }
        .full-call-name { font-size: 20px; margin-bottom: 12px; }
        .full-call-timer { font-size: 13px; color: var(--text-muted); font-family: monospace; }
        .full-call-actions { display: flex; gap: 45px; align-items: center; }
        .round-action-btn { width: 56px; height: 56px; border-radius: 50%; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .btn-hangup { background-color: var(--hangup-red); }
    </style>
</head>
<body>

<input type="file" id="hiddenFileInput" accept="image/*" style="display: none;">
<input type="file" id="bgImageFileInput" accept="image/*" style="display: none;" onchange="handleBgImageSelect(event)">
<input type="file" id="jsonFileInput" accept=".json" style="display: none;" onchange="handleJsonImport(event)">

<div class="chat-container" id="mainChatWindow">

    <!-- 頂欄 (防呆包覆：點擊整條任何無按鈕處皆可開啟設定) -->
    <div class="chat-header" id="chatHeaderBar" onclick="openPrefPanel()">
        <div class="header-left" onclick="event.stopPropagation(); editOtherName()">
            <div class="avatar-box" id="headerOtherAvatar" onclick="event.stopPropagation(); editOtherAvatar()">小</div>
            <div class="header-title-wrap">
                <span class="header-title" id="chatTitle">小鳥丸</span>
                <span class="arrow-down">▼</span>
            </div>
        </div>
        
        <div class="header-center-actions">
            <div class="icon-svg-btn" onclick="event.stopPropagation(); openPrefPanel()" title="配置設定">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </div>
            <div class="icon-svg-btn" onclick="event.stopPropagation(); toggleTheme()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.22" x2="5.64" y2="17.78"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg></div>
            <div class="icon-svg-btn" onclick="event.stopPropagation(); startCallSession()"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 .81.7A2 2 0 0 1 22 16.92z"></path></svg></div>
        </div>

        <div class="header-right" onclick="event.stopPropagation(); editMyName()">
            <div class="my-info-block">
                <span class="my-name" id="headerMyName">晴時雨</span>
            </div>
            <div class="avatar-box" id="headerMyAvatar" onclick="event.stopPropagation(); editMyAvatar()">晴</div>
        </div>
    </div>
    
    <!-- 訊息流 -->
    <div class="message-area" id="messageArea"></div>

    <!-- 正在輸入提示（固定在輸入框上方） -->
    <div class="typing-bar-sticky" id="typingBarSticky">
        <div class="typing-bubble-sticky">
            <span id="typingNameText">小鳥丸</span> 正在輸入中
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>

    <!-- 輸入欄 -->
    <div class="input-area">
        <input type="text" class="message-input" id="messageInput" placeholder="輸入消息..." onkeydown="if(event.keyCode==13) sendMessage()">
        <div class="force-trigger-btn" id="forceTriggerBtn" onclick="forceTriggerOtherMessage()" title="強制對方開啟新話題">⚡</div>
        <div class="bottom-action-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg></div>
    </div>

    <!-- 配置中心面版 -->
    <div class="modal-overlay" id="prefModalOverlay" onclick="closePrefPanel()">
        <div class="pref-panel" onclick="event.stopPropagation()">
            <div class="panel-top-bar">
                <span class="panel-main-title" id="panelNavTitle">配置控制中心</span>
                <button class="panel-save-btn" onclick="closePrefPanel()">完成</button>
            </div>

            <!-- 第一層視窗 -->
            <div class="panel-view-segment active" id="segmentMainMenu">
                <div class="main-menu-list">
                    <div class="menu-nav-item" onclick="switchSegment('segmentCardManage', '字卡數據配置')">
                        <span>📥 字卡管理</span>
                        <span class="nav-arrow">＞</span>
                    </div>
                    <div class="menu-nav-item" onclick="switchSegment('segmentChatAdjust', '聊天狀態調整')">
                        <span>💬 聊天調整</span>
                        <span class="nav-arrow">＞</span>
                    </div>
                    <div class="menu-nav-item" onclick="switchSegment('segmentBgAdjust', '背景視窗調整')">
                        <span>🖼️ 背景圖調整</span>
                        <span class="nav-arrow">＞</span>
                    </div>
                </div>
            </div>

            <!-- 第二層視窗 A -->
            <div class="panel-view-segment" id="segmentCardManage">
                <div class="panel-action-toolbar">
                    <div class="toolbar-btn" onclick="navigateToLayer('segmentMainMenu', '配置控制中心')">← 返回主菜單</div>
                    <div class="toolbar-btn" onclick="selectAllCards(true)">全选</div>
                    <div class="toolbar-btn" onclick="selectAllCards(false)">取消</div>
                    <div class="toolbar-btn danger" onclick="deleteSelectedCards()">删除</div>
                </div>
                <div class="panel-body-scroll">
                    <div class="section-box">
                        <div class="section-label">字卡文本录入区</div>
                        <div class="group-row">
                            <select class="group-dropdown" id="groupDropdown">
                                <option value="預設分組">預設分組</option>
                            </select>
                            <span class="add-group-text" onclick="addNewGroup()">+ 新增分组</span>
                        </div>
                        <textarea class="import-textarea" id="importTextarea" placeholder="每行輸入句文本，換行自動分割..." oninput="checkTextareaContent()"></textarea>
                    </div>
                    <div class="loaded-cards-container" id="loadedCardsContainer"></div>
                </div>
                <div class="panel-bottom-action-bar">
                    <div class="bottom-action-btn-main highlight" onclick="triggerJsonSelect()">导入 JSON 档案</div>
                    <div class="bottom-action-btn-main" id="injectBtn" onclick="injectIntoPool()">注入新字卡</div>
                </div>
            </div>

            <!-- 第二層視窗 B -->
            <div class="panel-view-segment" id="segmentChatAdjust">
                <div class="panel-action-toolbar">
                    <div class="toolbar-btn" onclick="navigateToLayer('segmentMainMenu', '配置控制中心')">← 返回主菜單</div>
                </div>
                <div class="panel-body-scroll">
                    <div class="section-box">
                        <div class="section-label">個人與對手名稱設定</div>
                        <input type="text" class="panel-input-field" id="inputMyNameForm" placeholder="我方暱稱">
                        <input type="text" class="panel-input-field" id="inputOtherNameForm" placeholder="對方備註名稱">
                    </div>
                    <div class="section-box">
                        <div class="section-label">聊天回覆速度 (隨機範圍秒數)</div>
                        <div class="range-inputs-flex">
                            <input type="number" class="panel-input-field" id="speedMinInput" min="1" placeholder="最少秒數">
                            <span style="color:var(--text-muted); font-size:13px; padding-bottom:12px;">至</span>
                            <input type="number" class="panel-input-field" id="speedMaxInput" min="1" placeholder="最多秒數">
                            <span style="color:var(--text-muted); font-size:13px; padding-bottom:12px;">秒</span>
                        </div>
                    </div>
                    <div class="section-box switch-row">
                        <div>
                            <div style="font-size: 14px; font-weight: bold; margin-bottom: 2px;">允許對方主動發送訊息</div>
                            <div style="font-size: 11px; color: var(--text-muted);">開啟後，無對話時對方會定時主動找話題</div>
                        </div>
                        <label class="switch-container">
                            <input type="checkbox" id="allowInitiativeSwitch" onchange="toggleInitiativeSubfields()">
                            <span class="switch-slider"></span>
                        </label>
                    </div>
                    <div class="section-box" id="initiativeTimeSubfield" style="display: none;">
                        <div class="section-label">主動發送時間限制 (分鐘)</div>
                        <div class="range-inputs-flex">
                            <span style="color:var(--text-muted); font-size:13px; padding-bottom:12px;">最多在</span>
                            <input type="number" class="panel-input-field" id="initiativeMinutesInput" min="1" step="1" value="5" placeholder="分鐘數">
                            <span style="color:var(--text-muted); font-size:13px; padding-bottom:12px;">分鐘之內主動發送</span>
                        </div>
                    </div>
                    <div class="section-box">
                        <button class="toolbar-btn" style="width:100%; padding:12px; font-weight:bold; color:var(--accent-green);" onclick="saveChatAdjustSettings()">同步保存上述聊天配置</button>
                    </div>
                    <div class="section-box">
                        <div class="section-label">對話模擬數據</div>
                        <button class="toolbar-btn danger" style="width:100%; padding:10px;" onclick="clearChatLogs()">清除當前全螢幕聊天紀錄</button>
                    </div>
                </div>
            </div>

            <!-- 第二層視窗 C -->
            <div class="panel-view-segment" id="segmentBgAdjust">
                <div class="panel-action-toolbar">
                    <div class="toolbar-btn" onclick="navigateToLayer('segmentMainMenu', '配置控制中心')">← 返回主菜單</div>
                </div>
                <div class="panel-body-scroll">
                    <div class="section-box">
                        <div class="section-label">視窗主背景圖片</div>
                        <div class="bg-preview-box" id="bgPreviewContainer">暫無自訂背景圖</div>
                        <button class="toolbar-btn" style="width:100%; padding:10px; margin-bottom:12px;" onclick="triggerBgSelect()">上傳並套用新背景圖片</button>
                        <button class="toolbar-btn danger" style="width:100%; padding:10px;" onclick="resetBgImage()">還原預設純黑底色</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 全螢幕大通話畫面 -->
    <div class="full-call-screen" id="fullCallScreen">
        <div class="full-call-center">
            <div class="full-call-avatar" id="fullCallAvatar"></div>
            <div class="full-call-name" id="fullCallName">小鳥丸</div>
            <div class="full-call-timer" id="fullCallTimer">等待接聽...</div>
        </div>
        <div class="full-call-actions" id="fullCallActionsArea">
            <button class="round-action-btn btn-hangup" onclick="hangupCall()">
                <svg viewBox="0 0 24 24" style="transform: rotate(135deg);"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.57a.988.988 0 0 0-1.01.24l-2.2 2.2a15.045 15.045 0 0 1-6.59-6.59l2.2-2.2c.28-.28.36-.67.25-1.02A11.36 11.36 0 0 1 8.5 4c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1 0 9.39 7.61 17 17 17 .55 0 1-.45 1-1v-3.59c0-.55-.45-1-1-1z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    let otherProfile = { name: '小鳥丸', imgData: null };
    let myProfile = { name: '晴時雨', imgData: null };
    let chatHistory = [];
    let replySpeedConfig = { min: 2, max: 5 };
    let allowInitiativeMessage = false;
    let maxInitiativeMinutes = 5; 
    let cardDatabase = [{ id: 1, group: '預設分組', text: '系統連線已就緒。' }];

    let callTimer = null, autoResponseTimeout = null, callSeconds = 0, isCallConnected = false; 
    let initiativeCheckInterval = null, nextInitiativeTriggerTime = 0, isTyping = false; 

    function applyAvatarStyle(element, imgData, defaultText) {
        if (imgData) {
            element.style.backgroundImage = `url('${imgData}')`;
            element.innerText = '';
        } else {
            element.style.backgroundImage = 'none';
            element.innerText = defaultText.charAt(0);
        }
    }

    function toggleTheme() { document.body.classList.toggle('light-theme'); }
    function editOtherAvatar() { triggerFileSelect((img) => { otherProfile.imgData = img; updateAllUI(); }); }
    function editOtherName() {
        const newName = prompt("請輸入對方的備註名稱:", otherProfile.name);
        if (newName && newName.trim() !== "") { otherProfile.name = newName.trim(); updateAllUI(); }
    }
    function editMyAvatar() { triggerFileSelect((img) => { myProfile.imgData = img; updateAllUI(); }); }
    function editMyName() {
        const newName = prompt("請輸入你的個人暱稱:", myProfile.name);
        if (newName && newName.trim() !== "") { myProfile.name = newName.trim(); updateAllUI(); }
    }

    function triggerFileSelect(callback) {
        const fileInput = document.getElementById('hiddenFileInput');
        fileInput.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) { callback(event.target.result); };
                reader.readAsDataURL(file);
            }
        };
        fileInput.click();
    }

    function updateAllUI() {
        applyAvatarStyle(document.getElementById('headerOtherAvatar'), otherProfile.imgData, otherProfile.name);
        applyAvatarStyle(document.getElementById('headerMyAvatar'), myProfile.imgData, myProfile.name);
        document.getElementById('chatTitle').innerText = otherProfile.name;
        document.getElementById('headerMyName').innerText = myProfile.name;
        renderMessages();
    }

    function renderMessages() {
        const area = document.getElementById('messageArea');
        area.innerHTML = '';
        
        chatHistory.forEach(msg => {
            const row = document.createElement('div');
            if(msg.type === 'system') {
                row.className = 'message-row system-log';
                row.innerHTML = `<span class="system-log-text">${msg.text}</span>`;
            } else {
                row.className = `message-row ${msg.type}`;
                const av = document.createElement('div');
                av.className = 'avatar-box msg-avatar';
                if(msg.type === 'me') applyAvatarStyle(av, myProfile.imgData, myProfile.name);
                else applyAvatarStyle(av, otherProfile.imgData, otherProfile.name);
                
                const mBox = document.createElement('div');
                mBox.className = `message ${msg.type}`;
                mBox.innerHTML = `${msg.text} <span style="display:block; font-size:10px; color:var(--text-muted); margin-top:4px; text-align:right;">${msg.time || ''}</span>`;
                row.appendChild(av); row.appendChild(mBox);
            }
            area.appendChild(row);
        });

        const stickyTyping = document.getElementById('typingBarSticky');
        if (isTyping) {
            document.getElementById('typingNameText').innerText = otherProfile.name;
            stickyTyping.style.display = 'block';
        } else {
            stickyTyping.style.display = 'none';
        }
        area.scrollTop = area.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('messageInput');
        if (input.value.trim() === '') return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        
        chatHistory.push({ type: 'me', text: input.value.trim(), time: timeStr });
        renderMessages();
        input.value = '';
        resetNextInitiativeTime();
        triggerVirtualReply();
    }

    function triggerVirtualReply() {
        if (isTyping) return; 
        isTyping = true;
        renderMessages();

        const minSec = replySpeedConfig.min;
        const maxSec = replySpeedConfig.max >= minSec ? replySpeedConfig.max : minSec;
        const chosenSeconds = Math.floor(Math.random() * (maxSec - minSec + 1)) + minSec;

        setTimeout(() => {
            let replyText = "";
            if (cardDatabase.length === 0) {
                replyText = "(未載入字卡數據)";
            } else {
                const pickCount = Math.min(cardDatabase.length, Math.floor(Math.random() * 2) + 1);
                let selectedTexts = [];
                for(let i=0; i<pickCount; i++) {
                    const randomIdx = Math.floor(Math.random() * cardDatabase.length);
                    selectedTexts.push(cardDatabase[randomIdx].text);
                }
                replyText = selectedTexts.join(" ");
            }

            const now = new Date();
            const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            chatHistory.push({ type: 'other', text: replyText, time: timeStr });
            isTyping = false;
            renderMessages();
            resetNextInitiativeTime();
        }, chosenSeconds * 1000);
    }

    function forceTriggerOtherMessage() { if(!isTyping) triggerVirtualReply(); }
    function resetNextInitiativeTime() {
        nextInitiativeTriggerTime = Date.now() + ((Math.floor(Math.random() * (maxInitiativeMinutes * 60 - 5 + 1)) + 5) * 1000);
    }

    function startInitiativeMonitor() {
        if(initiativeCheckInterval) clearInterval(initiativeCheckInterval);
        resetNextInitiativeTime();
        initiativeCheckInterval = setInterval(() => {
            if (allowInitiativeMessage && !isTyping && Date.now() >= nextInitiativeTriggerTime) {
                triggerVirtualReply();
            }
        }, 1000);
    }

    function toggleInitiativeSubfields() {
        document.getElementById('initiativeTimeSubfield').style.display = document.getElementById('allowInitiativeSwitch').checked ? 'block' : 'none';
    }

    function openPrefPanel() {
        document.getElementById('prefModalOverlay').style.display = 'flex';
        document.getElementById('inputMyNameForm').value = myProfile.name;
        document.getElementById('inputOtherNameForm').value = otherProfile.name;
        document.getElementById('speedMinInput').value = replySpeedConfig.min;
        document.getElementById('speedMaxInput').value = replySpeedConfig.max;
        document.getElementById('allowInitiativeSwitch').checked = allowInitiativeMessage;
        document.getElementById('initiativeMinutesInput').value = maxInitiativeMinutes;
        toggleInitiativeSubfields();
        navigateToLayer('segmentMainMenu', '配置控制中心');
        renderCardDatabaseList();
    }
    
    function closePrefPanel() { document.getElementById('prefModalOverlay').style.display = 'none'; }
    function navigateToLayer(targetSegmentId, titleText) {
        document.querySelectorAll('.panel-view-segment').forEach(seg => seg.classList.remove('active'));
        document.getElementById(targetSegmentId).classList.add('active');
        document.getElementById('panelNavTitle').innerText = titleText;
    }
    function switchSegment(id, title) { navigateToLayer(id, title); }

    function saveChatAdjustSettings() {
        myProfile.name = document.getElementById('inputMyNameForm').value.trim() || myProfile.name;
        otherProfile.name = document.getElementById('inputOtherNameForm').value.trim() || otherProfile.name;
        replySpeedConfig.min = parseInt(document.getElementById('speedMinInput').value) || replySpeedConfig.min;
        replySpeedConfig.max = parseInt(document.getElementById('speedMaxInput').value) || replySpeedConfig.min;
        allowInitiativeMessage = document.getElementById('allowInitiativeSwitch').checked;
        maxInitiativeMinutes = parseInt(document.getElementById('initiativeMinutesInput').value) || maxInitiativeMinutes;
        if(allowInitiativeMessage) resetNextInitiativeTime();
        updateAllUI();
        alert("設定已儲存！");
    }

    function clearChatLogs() {
        if(confirm("確定要排空聊天紀錄嗎？")) { chatHistory = []; isTyping = false; renderMessages(); }
    }

    function triggerBgSelect() { document.getElementById('bgImageFileInput').click(); }
    function handleBgImageSelect(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('mainChatWindow').style.backgroundImage = `url('${e.target.result}')`;
                document.getElementById('bgPreviewContainer').style.backgroundImage = `url('${e.target.result}')`;
                document.getElementById('bgPreviewContainer').innerText = "";
            };
            reader.readAsDataURL(file);
        }
    }
    function resetBgImage() {
        document.getElementById('mainChatWindow').style.backgroundImage = 'none';
        document.getElementById('bgPreviewContainer').style.backgroundImage = 'none';
        document.getElementById('bgPreviewContainer').innerText = "暫無自訂背景圖";
    }

    function checkTextareaContent() {
        document.getElementById('injectBtn').classList.toggle('ready-inject', document.getElementById('importTextarea').value.trim() !== "");
    }
    function addNewGroup(customName = null) {
        const gName = customName || prompt("請輸入新分組名稱:");
        if(gName && gName.trim() !== "") {
            const dropdown = document.getElementById('groupDropdown');
            for (let i = 0; i < dropdown.options.length; i++) if (dropdown.options[i].value === gName.trim()) return gName.trim();
            const opt = document.createElement('option'); opt.value = gName.trim(); opt.innerText = gName.trim();
            dropdown.appendChild(opt); dropdown.value = gName.trim(); return gName.trim();
        }
        return null;
    }

    function injectIntoPool() {
        const tx = document.getElementById('importTextarea');
        const group = document.getElementById('groupDropdown').value;
        if(!tx.value.trim()) return;
        tx.value.split('
').forEach(line => {
            if(line.trim()) cardDatabase.push({ id: Date.now() + Math.random(), group: group, text: line.trim() });
        });
        tx.value = ""; checkTextareaContent(); renderCardDatabaseList();
    }

    function triggerJsonSelect() { document.getElementById('jsonFileInput').click(); }
    function handleJsonImport(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const jsonData = JSON.parse(e.target.result); let total = 0;
                if (jsonData && Array.isArray(jsonData.customReplyGroups)) {
                    jsonData.customReplyGroups.forEach(g => {
                        addNewGroup(g.name);
                        if(Array.isArray(g.items)) g.items.forEach(t => { if(t.trim()) { cardDatabase.push({ id: Date.now()+Math.random(), group: g.name.trim(), text: t.trim() }); total++; } });
                    });
                } else if (jsonData && Array.isArray(jsonData.customReplies)) {
                    jsonData.customReplies.forEach(t => { if(t.trim()) { cardDatabase.push({ id: Date.now()+Math.random(), group: "預設分組", text: t.trim() }); total++; } });
                }
                alert(`導入成功，共 ${total} 筆！`); renderCardDatabaseList();
            } catch { alert("解析失敗！"); }
        };
        reader.readAsText(file);
    }

    function renderCardDatabaseList() {
        const container = document.getElementById('loadedCardsContainer'); container.innerHTML = "";
        cardDatabase.forEach(item => {
            const div = document.createElement('div'); div.className = 'card-list-item';
            div.innerHTML = `<div class="card-item-left"><input type="checkbox" class="card-checkbox" data-id="${item.id}"><span class="group-badge">${item.group}</span><span class="card-item-text">${item.text}</span></div><span class="card-item-del-x" onclick="deleteSingleCard(${item.id})">×</span>`;
            container.appendChild(div);
        });
    }
    function deleteSingleCard(id) { cardDatabase = cardDatabase.filter(i => i.id !== id); renderCardDatabaseList(); }
    function selectAllCards(status) { document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = status); }
    function deleteSelectedCards() {
        let ids = Array.from(document.querySelectorAll('.card-checkbox:checked')).map(cb => parseFloat(cb.getAttribute('data-id')));
        cardDatabase = cardDatabase.filter(i => !ids.includes(i.id)); renderCardDatabaseList();
    }

    function startCallSession() {
        clearInterval(callTimer); clearTimeout(autoResponseTimeout); callSeconds = 0;
        document.getElementById('fullCallName').innerText = otherProfile.name;
        applyAvatarStyle(document.getElementById('fullCallAvatar'), otherProfile.imgData, otherProfile.name);
        document.getElementById('fullCallScreen').style.display = 'flex';
        autoResponseTimeout = setTimeout(() => {
            callTimer = setInterval(() => {
                callSeconds++;
                document.getElementById('fullCallTimer').innerText = `${String(Math.floor(callSeconds / 60)).padStart(2, '0')}:${String(callSeconds % 60).padStart(2, '0')}`;
            }, 1000);
        }, 2500);
    }
    function hangupCall() { clearInterval(callTimer); clearTimeout(autoResponseTimeout); document.getElementById('fullCallScreen').style.display = 'none'; }

    window.onload = function() { updateAllUI(); startInitiativeMonitor(); }
</script>
</body>
</html>
